name: O1 Weekly Job Digest

on:
  schedule:
    - cron: '0 14 * * 1'   # Every Monday at 9am ET (14:00 UTC)
  workflow_dispatch:         # Allow manual trigger from GitHub UI

jobs:
  scrape-and-post:
    runs-on: ubuntu-22.04

    permissions:
      contents: write        # needed to commit seen_jobs.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run scraper
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SEEKING_CHANNEL_ID: C0AD3CPTN6Q
          DRY_RUN: "true"  # remove this line when ready to go live

        run: python -m bot.run

      - name: Commit seen_jobs.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_jobs.json
          git diff --cached --quiet || git commit -m "chore: update seen_jobs [skip ci]"
          git push
